<!-- 입력창 + 카테고리 셀렉터 -->
<div class="input-bar">
  <div class="input-bar__category-wrapper">
    <select class="input-bar__category" aria-label="카테고리 선택">
      <option value="">기타</option>
      <option value="work">업무</option>
      <option value="personal">개인</option>
      <option value="meeting">회의/미팅</option>
    </select>
    <svg class="input-bar__category-chevron" viewBox="0 0 10 6" aria-hidden="true">
      <path d="M1 1L5 5L9 1" />
    </svg>
  </div>
  <input
    type="text"
    class="input-bar__text"
    placeholder="할 일을 입력하세요"
    aria-label="할 일 입력"
  />
</div>
