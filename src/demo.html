<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To Do List — 컴포넌트 데모</title>
<link rel="stylesheet" href="styles/tokens.css" />
<link rel="stylesheet" href="styles/components/checkbox.css" />
<link rel="stylesheet" href="styles/components/category-pill.css" />
<link rel="stylesheet" href="styles/components/input-bar.css" />
<link rel="stylesheet" href="styles/components/add-button.css" />
<link rel="stylesheet" href="styles/components/filter-tab.css" />
<link rel="stylesheet" href="styles/components/todo-item.css" />
<link rel="stylesheet" href="styles/components/category-group-header.css" />
<link rel="stylesheet" href="styles/components/empty-state.css" />
<link rel="stylesheet" href="styles/components/bottom-bar.css" />
<style>
  body {
    background: var(--color-bg-default);
    font-family: var(--font-family-body);
    padding: var(--space-7);
  }
  section {
    margin-bottom: var(--space-7);
  }
  h2 {
    font-family: var(--font-family-display);
    font-size: var(--font-size-heading-md);
    line-height: var(--line-height-heading-md);
    color: var(--color-text-primary);
    margin-bottom: var(--space-4);
  }
  .row {
    display: flex;
    gap: var(--space-5);
    align-items: center;
  }
</style>
</head>
<body>
  <section>
    <h2>1. 체크박스</h2>
    <div class="row">
      <!-- 체크박스 — 기본(미완료) 상태 -->
      <label class="checkbox">
        <input type="checkbox" class="checkbox__input" aria-label="할 일 완료 표시" />
        <span class="checkbox__box">
          <svg class="checkbox__icon" viewBox="0 0 12 10" aria-hidden="true">
            <path d="M1 5L4.5 8.5L11 1" />
          </svg>
        </span>
      </label>

      <!-- 체크박스 — 완료 상태 -->
      <label class="checkbox">
        <input type="checkbox" class="checkbox__input" aria-label="할 일 완료 표시" checked />
        <span class="checkbox__box">
          <svg class="checkbox__icon" viewBox="0 0 12 10" aria-hidden="true">
            <path d="M1 5L4.5 8.5L11 1" />
          </svg>
        </span>
      </label>
    </div>
  </section>

  <section>
    <h2>2. 카테고리 Pill</h2>
    <div class="row">
      <span class="category-pill category-pill--work">업무</span>
      <span class="category-pill category-pill--personal">개인</span>
      <span class="category-pill category-pill--meeting">회의/미팅</span>
      <span class="category-pill category-pill--etc">기타</span>
    </div>
  </section>

  <section>
    <h2>3. 입력창 + 카테고리 셀렉터</h2>
    <div class="input-bar">
      <div class="input-bar__category-wrapper">
        <select class="input-bar__category" aria-label="카테고리 선택">
          <option value="">기타</option>
          <option value="work">업무</option>
          <option value="personal">개인</option>
          <option value="meeting">회의/미팅</option>
        </select>
        <svg class="input-bar__category-chevron" viewBox="0 0 10 6" aria-hidden="true">
          <path d="M1 1L5 5L9 1" />
        </svg>
      </div>
      <input
        type="text"
        class="input-bar__text"
        placeholder="할 일을 입력하세요"
        aria-label="할 일 입력"
      />
    </div>
  </section>

  <section>
    <h2>4. 추가 버튼</h2>
    <div class="row">
      <button type="button" class="add-button">
        <svg class="add-button__icon" viewBox="0 0 14 14" aria-hidden="true">
          <path d="M7 1V13M1 7H13" />
        </svg>
        추가
      </button>
    </div>
  </section>

  <section>
    <h2>5. 필터 탭</h2>
    <div class="row" style="margin-bottom: var(--space-3);">
      <div class="filter-tabs" role="tablist" aria-label="상태 필터">
        <button type="button" role="tab" aria-selected="true" class="filter-tab">전체</button>
        <button type="button" role="tab" aria-selected="false" class="filter-tab">진행중</button>
        <button type="button" role="tab" aria-selected="false" class="filter-tab">완료</button>
      </div>
    </div>
    <div class="row">
      <div class="filter-tabs" role="group" aria-label="카테고리 필터">
        <button type="button" class="filter-tab filter-tab--category filter-tab--work" aria-pressed="true">업무</button>
        <button type="button" class="filter-tab filter-tab--category filter-tab--personal" aria-pressed="false">개인</button>
        <button type="button" class="filter-tab filter-tab--category filter-tab--meeting" aria-pressed="false">회의/미팅</button>
        <button type="button" class="filter-tab filter-tab--category filter-tab--etc" aria-pressed="false">기타</button>
      </div>
    </div>
  </section>

  <section>
    <h2>6. 할 일 아이템</h2>
    <ul class="todo-list">
      <li class="todo-item">
        <label class="checkbox">
          <input type="checkbox" class="checkbox__input" aria-label="할 일 완료 표시" />
          <span class="checkbox__box">
            <svg class="checkbox__icon" viewBox="0 0 12 10" aria-hidden="true">
              <path d="M1 5L4.5 8.5L11 1" />
            </svg>
          </span>
        </label>
        <div class="todo-item__content">
          <p class="todo-item__text">Q4 전략 문서 마무리하기</p>
          <span class="category-pill category-pill--work todo-item__tag">업무</span>
        </div>
        <div class="todo-item__actions">
          <button type="button" class="todo-item__action" aria-label="수정">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M11.3 1.7a1.5 1.5 0 0 1 2.1 2.1L5.5 11.7l-2.8.9.9-2.8Z" />
            </svg>
          </button>
          <button type="button" class="todo-item__action todo-item__action--delete" aria-label="삭제">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 4h10M6 4V2.5A.5.5 0 0 1 6.5 2h3a.5.5 0 0 1 .5.5V4M4.5 4l.6 8.5a1 1 0 0 0 1 .9h3.8a1 1 0 0 0 1-.9L12 4" />
            </svg>
          </button>
        </div>
      </li>

      <li class="todo-item todo-item--completed">
        <label class="checkbox">
          <input type="checkbox" class="checkbox__input" aria-label="할 일 완료 표시" checked />
          <span class="checkbox__box">
            <svg class="checkbox__icon" viewBox="0 0 12 10" aria-hidden="true">
              <path d="M1 5L4.5 8.5L11 1" />
            </svg>
          </span>
        </label>
        <div class="todo-item__content">
          <p class="todo-item__text">아침 명상하기</p>
          <span class="category-pill category-pill--personal todo-item__tag">개인</span>
        </div>
        <div class="todo-item__actions">
          <button type="button" class="todo-item__action" aria-label="수정">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M11.3 1.7a1.5 1.5 0 0 1 2.1 2.1L5.5 11.7l-2.8.9.9-2.8Z" />
            </svg>
          </button>
          <button type="button" class="todo-item__action todo-item__action--delete" aria-label="삭제">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 4h10M6 4V2.5A.5.5 0 0 1 6.5 2h3a.5.5 0 0 1 .5.5V4M4.5 4l.6 8.5a1 1 0 0 0 1 .9h3.8a1 1 0 0 0 1-.9L12 4" />
            </svg>
          </button>
        </div>
      </li>
    </ul>
  </section>

  <section>
    <h2>7. 카테고리 그룹 헤더</h2>
    <div class="category-group-header category-group-header--work">
      <span class="category-group-header__dot" aria-hidden="true"></span>
      <span class="category-group-header__label">업무</span>
      <span class="category-group-header__count">2개</span>
    </div>
  </section>

  <section>
    <h2>8. 빈 상태 (Empty State)</h2>
    <div class="empty-state">
      <div class="empty-state__icon" aria-hidden="true">
        <svg viewBox="0 0 32 32">
          <rect x="6" y="4" width="20" height="24" rx="2" />
          <path d="M11 12h10M11 17h10M11 22h6" />
        </svg>
      </div>
      <p class="empty-state__text">할 일을 추가해보세요</p>
    </div>
  </section>

  <section>
    <h2>9. 하단 상태바</h2>
    <div class="bottom-bar">
      <button type="button" class="bottom-bar__action">완료된 항목 일괄 삭제</button>
    </div>
  </section>
</body>
</html>
